<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>USA Map Project Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="panels.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="map.css">
    <link rel="stylesheet" href="toolbar.css">

    <style>
        /* Base application variables that your CSS stylesheets require to display colors */
        :root {
            --bg: #0f1923;
            --surface: #182433;
            --surface2: #1e2f42;
            --surface3: #243b54;
            --border: #2a3f55;
            --border2: #3a5675;
            --accent: #3b82f6;
            --accent2: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text: #e8f0fe;
            --text2: #8ba3bc;
            --text3: #4a6580;
            --radius: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            --shadow: 0 4px 24px rgba(0,0,0,.4);
            --font: 'Inter', sans-serif;
            --sidebar-width: 320px;
            --topbar-height: 48px;
            --zrow-height: 36px;
            --gap-sm: 8px;
            --transition: 0.15s ease;
            --transition-slow: 0.3s ease;
            --ocean: #0b131c;
        }

        /* Interactive tile grid styling inside the workspace */
        .state-app-tile {
            display: inline-block;
            padding: 12px 16px;
            margin: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text);
            font-weight: 600;
            transition: all var(--transition);
        }
        .state-app-tile:hover {
            border-color: var(--accent);
            background: var(--surface3);
            transform: translateY(-2px);
        }
        #interactive-dashboard-grid {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="topbar">
        <div class="tb-left">
            <div class="logo">
                <span class="logo-icon">🗺️</span>
                <span class="logo-text">USA Project Dashboard</span>
            </div>
            <div class="sep"></div>
            <div id="modes">
                <button class="mbtn on" id="mfree">Explore Dataset</button>
            </div>
        </div>
    </div>
    
    <div id="zrow">
        <span class="zrow-label">System Control:</span>
        <button class="zoom-btn" id="zin">+</button>
        <div class="zoom-val" id="zval">100%</div>
        <button class="zoom-btn" id="zout">−</button>
    </div>

    <div id="main">
        <div id="map-wrap" style="overflow-y: auto;">
            <div id="interactive-dashboard-grid"></div>
        </div>
        
        <div id="side">
            <div id="tabs">
                <button class="tab active" id="tab-info">State Data Profile</button>
            </div>
            <div id="tab-content">
                <div id="info-card">
                    <div id="info-color-bar" style="background: var(--accent);"></div>
                    <div class="state-title" id="panel-state-name">Select a State Item</div>
                    <div class="abbr-badge" id="panel-state-abbr" style="background: var(--border); color: var(--text);">--</div>
                    
                    <div class="stat-grid" style="margin-top: 15px;">
                        <div class="stat-box">
                            <div class="sv" id="stat-nickname">N/A</div>
                            <div class="score-label">Official Nickname</div>
                        </div>
                        <div class="stat-box">
                            <div class="sv" id="stat-fips">--</div>
                            <div class="score-label">FIPS Index Code</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.MAP_STATE = { allItems: {} };
        window.COLORS = window.COLORS || { classic: {} };
    </script>

    <script src="data.js"></script>
    <script src="colors.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("interactive-dashboard-grid");
            const nameDisplay = document.getElementById("panel-state-name");
            const abbrDisplay = document.getElementById("panel-state-abbr");
            const nicknameDisplay = document.getElementById("stat-nickname");
            const fipsDisplay = document.getElementById("stat-fips");
            const colorBar = document.getElementById("info-color-bar");

            if (typeof DATA !== 'undefined') {
                Object.keys(DATA.NAMES).forEach(abbr => {
                    // Populate framework variable tracking queries
                    window.MAP_STATE.allItems[abbr] = { id: abbr, snapped: true };

                    // Pull color palettes from colors.js safely if found
                    let stateThemeColor = "var(--accent)";
                    if (typeof COLORS !== 'undefined' && COLORS.classic && COLORS.classic[abbr]) {
                        stateThemeColor = COLORS.classic[abbr];
                    }

                    // Generate clickable display objects
                    const tile = document.createElement("div");
                    tile.className = "state-app-tile";
                    tile.style.borderLeft = `4px solid ${stateThemeColor}`;
                    tile.innerText = `${DATA.EMOJIS[abbr] || '📍'} ${DATA.NAMES[abbr]}`;

                    // Click interactions updating dashboard widgets safely
                    tile.addEventListener("click", () => {
                        nameDisplay.innerText = `${DATA.EMOJIS[abbr] || ''} ${DATA.NAMES[abbr]}`;
                        abbrDisplay.innerText = `Postal Code: ${abbr}`;
                        nicknameDisplay.innerText = DATA.NICKNAMES[abbr] || 'None Listed';
                        
                        // Look up FIPS index
                        const fipsCode = Object.keys(DATA.FIPS).find(key => DATA.FIPS[key] === abbr) || '--';
                        fipsDisplay.innerText = fipsCode;
                        
                        colorBar.style.background = stateThemeColor;
                    });

                    grid.appendChild(tile);
                });
            } else {
                nameDisplay.innerText = "Error: data.js connection missing.";
            }
        });
    </script>
</body>
</html>
