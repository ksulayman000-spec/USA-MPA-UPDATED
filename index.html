<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>USA Map Project Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="panels.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="map.css">
    <link rel="stylesheet" href="toolbar.css">

    <style>
        :root {
            --bg: #0f1923; --surface: #182433; --surface2: #1e2f42; --surface3: #243b54;
            --border: #2a3f55; --accent: #3b82f6; --text: #e8f0fe; --text2: #8ba3bc;
            --radius: 8px; --font: 'Inter', sans-serif;
        }
        /* Interactive tile grid styling inside the workspace */
        .state-app-tile {
            display: inline-block; padding: 12px 16px; margin: 6px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius); cursor: pointer; color: var(--text);
            font-weight: 600; transition: all 0.15s ease;
        }
        .state-app-tile:hover {
            border-color: var(--accent); background: var(--surface3);
            transform: translateY(-2px);
        }
        #interactive-dashboard-grid { padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>

    <div id="topbar">
        <div class="tb-left">
            <div class="logo">
                <span class="logo-icon">🗺️</span>
                <span class="logo-text">USA Project Dashboard</span>
            </div>
        </div>
    </div>
    
    <div id="main">
        <div id="map-wrap" style="overflow-y: auto;">
            <div id="interactive-dashboard-grid"></div>
        </div>
        
        <div id="side">
            <div id="tabs">
                <button class="tab active" id="tab-info">State Data Profile</button>
            </div>
            <div id="tab-content">
                <div id="info-card">
                    <div id="info-color-bar" style="height: 4px; background: var(--accent); margin-bottom: 10px;"></div>
                    <div class="state-title" id="panel-state-name">Loading items...</div>
                    <div id="panel-state-body" style="margin-top: 15px; color: var(--text2); line-height: 1.6;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.MAP_STATE = { allItems: {} };
        window.COLORS = window.COLORS || { classic: {} };
    </script>

    <script src="data.js"></script>
    <script src="colors.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("interactive-dashboard-grid");
            const nameDisplay = document.getElementById("panel-state-name");
            const bodyDisplay = document.getElementById("panel-state-body");

            // Look for your DATA variable, or fallback to stateData if named differently
            const activeData = (typeof DATA !== 'undefined') ? DATA : (typeof stateData !== 'undefined' ? stateData : null);

            if (activeData && activeData.NAMES) {
                nameDisplay.innerText = "Select a State Item";
                
                Object.keys(activeData.NAMES).forEach(abbr => {
                    window.MAP_STATE.allItems[abbr] = { id: abbr, snapped: true };

                    let stateThemeColor = "var(--accent)";
                    if (typeof COLORS !== 'undefined' && COLORS.classic && COLORS.classic[abbr]) {
                        stateThemeColor = COLORS.classic[abbr];
                    }

                    const tile = document.createElement("div");
                    tile.className = "state-app-tile";
                    tile.style.borderLeft = `4px solid ${stateThemeColor}`;
                    tile.innerText = `${activeData.EMOJIS?.[abbr] || '📍'} ${activeData.NAMES[abbr]}`;

                    tile.addEventListener("click", () => {
                        nameDisplay.innerText = `${activeData.EMOJIS?.[abbr] || ''} ${activeData.NAMES[abbr]} (${abbr})`;
                        bodyDisplay.innerHTML = `
                            <p><strong>Official Nickname:</strong> ${activeData.NICKNAMES?.[abbr] || 'None Listed'}</p>
                            <p><strong>FIPS Index Code:</strong> ${Object.keys(activeData.FIPS || {}).find(key => activeData.FIPS[key] === abbr) || '--'}</p>
                        `;
                        document.getElementById("info-color-bar").style.background = stateThemeColor;
                    });

                    grid.appendChild(tile);
                });
            } else {
                nameDisplay.innerText = "Data Connection Error";
                bodyDisplay.innerHTML = `
                    <p style="color: var(--danger);">The interface loaded, but it can't read the lists inside your <strong>data.js</strong> file.</p>
                    <p>Make sure your data file starts exactly with <code>const DATA = {</code> or <code>var DATA = {</code>!</p>
                `;
            }
        });
    </script>
</body>
</html>
